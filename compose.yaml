services:
  mysql:
    image: mysql:8.4
    container_name: open-xiaoai-agent-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: open_xiaoai_agent
    ports:
      - "3306:3306"
    volumes:
      - open_xiaoai_agent_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  open_xiaoai_agent_mysql:
